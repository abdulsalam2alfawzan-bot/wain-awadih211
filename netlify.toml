[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/google-place-details"
  to = "/.netlify/functions/google-place-details"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
